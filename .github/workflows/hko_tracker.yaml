name: Run HKO Tracker

on:
  repository_dispatch:
    types: [trigger-every-10-min]
  workflow_dispatch:
    inputs:
      custom_action:
        description: 'Action for Custom Warning'
        type: choice
        options:
          - NONE (Run Auto Check Only)
          - ISSUE
          - EXTEND
          - CANCEL
        default: 'NONE (Run Auto Check Only)'
      warning_type:
        description: 'Custom Warning Type'
        type: choice
        options:
          - White Rainstorm Warning
          - Blue Rainstorm Warning
          - Red Rainstorm Watch
          - Black Rainstorm Watch
          - Severe Thunderstorm Emergency
      valid_until:
        description: 'Valid Until Time (24h format, e.g., 19:30 or 08:15) - Ignored for Watches/Emergency'
        type: string
        required: false
      area:
        description: 'Area (Only for Severe Thunderstorm Emergency)'
        type: choice
        options:
          - None
          - Kowloon
          - Outlying Islands
          - West NT
          - East NT
          - HK Island

permissions:
  contents: write
  actions: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Fonts (for Image Generator)
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-noto-cjk

    - name: Restore Warning State Cache
      id: state-cache
      uses: actions/cache@v4
      with:
        path: warning_state.json
        key: hko-state-cache-${{ github.run_id }}
        restore-keys: |
          hko-state-cache-

    - name: Install Python Dependencies
      run: pip install requests pillow

    - name: Run script
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        CUSTOM_ACTION: ${{ github.event.inputs.custom_action }}
        CUSTOM_TYPE: ${{ github.event.inputs.warning_type }}
        CUSTOM_VALID_UNTIL: ${{ github.event.inputs.valid_until }}
        CUSTOM_AREA: ${{ github.event.inputs.area }}
      run: python bot.py

    - name: Save Updated Warning State Cache
      uses: actions/cache/save@v4
      if: always()
      with:
        path: warning_state.json
        key: hko-state-cache-${{ github.run_id }}
