<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKO Weather Tracker Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    
    <style>
        :root {
            --bg-color: #1e1f22; --panel-bg: #2b2d31;
            --text-main: #dbdee1; --text-sub: #949ba4;
            --accent-red: #ff5f5f; --accent-purple: #9b59b6;
            --accent-orange: #f39c12; --border: #3f4147;
            
            --s1: #2ecc71; --s2: #f1c40f; --s3: #e67e22; 
            --s4: #e74c3c; --s5: #9b59b6;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; padding-bottom: 80px;}
        .container { max-width: 900px; margin: 0 auto; }
        h1, h2, h3 { border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .card { background-color: var(--panel-bg); border-radius: 8px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.85em; font-weight: bold; margin-right: 10px; }
        .tag.meso { background-color: var(--accent-orange); color: #fff; }
        .tag.active { background-color: #2ecc71; color: #fff; }
        
        #map-container { height: 500px; width: 100%; border-radius: 8px; border: 1px solid var(--border); position: relative; z-index: 1;}
        
        /* Timeline Slider (Zoom Earth Style) */
        .timeline-container {
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(30, 31, 34, 0.95); border-top: 1px solid var(--border);
            padding: 15px 30px; display: flex; align-items: center; gap: 20px; z-index: 1000;
        }
        #timeSlider { flex-grow: 1; cursor: pointer; }
        #timeDisplay { font-weight: bold; min-width: 180px; color: #fff;}
        .btn-live { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;}
        
        /* Admin Tools */
        .admin-tools { background: #111; border: 1px solid #444; border-radius: 8px; padding: 15px; margin-bottom: 20px; display: none; }
        #generator-map { height: 350px; width: 100%; margin: 10px 0; border: 1px solid #555;}
        textarea { width: 100%; height: 60px; background: #222; color: #0f0; border: 1px solid #444; font-family: monospace; padding: 5px; margin-bottom: 15px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-group input { flex: 1; background: #222; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; }
        button.admin-btn { background: #444; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        button.admin-btn:hover { background: #666; }
        
        /* Custom Popup styling */
        .leaflet-popup-content-wrapper { background: #2b2d31 !important; color: #dbdee1 !important; }
        .leaflet-popup-tip { background: #2b2d31 !important; }
        .sev-badge { padding: 2px 6px; border-radius: 4px; font-weight: bold; color: white; float: right;}
        .sev-S1 { background: var(--s1); } .sev-S2 { background: var(--s2); } .sev-S3 { background: var(--s3); }
        .sev-S4 { background: var(--s4); } .sev-S5 { background: var(--s5); }
        
        .history-list { max-height: 150px; overflow-y: auto; margin-top: 10px; padding-top: 10px; border-top: 1px solid #555; font-size: 12px;}
        .history-item { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed #444;}
    </style>
</head>
<body>

<div class="container">
    <h1>📡 Weather Monitoring Dashboard</h1>
    
    <button class="admin-btn" onclick="toggleAdmin()">⚙️ Toggle Admin Tools</button>
    <div class="admin-tools" id="adminTools">
        <h3>📍 Mesoscale Draw & Auto-Calculator</h3>
        <div id="generator-map"></div>
        <div class="input-group">
            <input type="text" id="meso-movement" placeholder="Movement (e.g., ENE at 25 km/h)" oninput="updatePayload()">
            <input type="text" id="meso-intensity" placeholder="Intensity (e.g., 50-70 mm/h)" oninput="updatePayload()">
        </div>
        <div style="margin-bottom: 10px;">Calculated Severity: <span id="admin-sev-badge" class="sev-badge sev-S1">S1</span></div>
        <textarea id="coord-output" readonly placeholder="Payload string..."></textarea>
    </div>
    
    <h2>⚠️ Interactive Storm Tracker</h2>
    <div id="map-container"></div>
    <div id="active-warnings" style="margin-top:20px;">Loading...</div>
</div>

<!-- Timeline Scrubber -->
<div class="timeline-container">
    <button class="btn-live" onclick="goToLive()">LIVE</button>
    <input type="range" id="timeSlider" min="0" max="100" value="100">
    <div id="timeDisplay">Live Data</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script>
    let viewMap, genMap;
    let viewLayers = [];
    let generatorMapInit = false;
    let currentDrawnLayer = null;
    
    let globalHistoryData = { mesoscale_discussions: [] };
    let isLive = true;
    
    // Severity Calculator
    function calculateSeverity(intensityStr, diameterStr) {
        let maxRain = 0; let maxDia = 0;
        const rainMatch = intensityStr.match(/(\d+)/g);
        if (rainMatch) maxRain = Math.max(...rainMatch.map(Number));
        const diaMatch = diameterStr.match(/(\d+)/g);
        if (diaMatch) maxDia = Math.max(...diaMatch.map(Number));

        let base = 1; // S1
        if (maxRain >= 30) base = 2;
        if (maxRain >= 50) base = 3;
        if (maxRain >= 70) base = 4;
        if (maxRain >= 100) base = 5;

        if (maxDia >= 40) base += 1;
        if (maxDia >= 80) base += 1;

        return `S${Math.min(5, Math.max(1, base))}`;
    }

    // Haversine Destination Math for 2-hour Forecast
    const bearMap = {'N':0, 'NNE':22.5, 'NE':45, 'ENE':67.5, 'E':90, 'ESE':112.5, 'SE':135, 'SSE':157.5, 'S':180, 'SSW':202.5, 'SW':225, 'WSW':247.5, 'W':270, 'WNW':292.5, 'NW':315, 'NNW':337.5};
    
    function getForecastCoords(centerStr, movementStr) {
        if (!centerStr || !movementStr) return null;
        
        const latMatch = centerStr.match(/([\d\.]+)/g);
        if(!latMatch || latMatch.length < 2) return null;
        let lat = parseFloat(latMatch[0]) * (centerStr.includes('S') ? -1 : 1);
        let lng = parseFloat(latMatch[1]) * (centerStr.includes('W') ? -1 : 1);

        const dirMatch = movementStr.match(/([A-Z]{1,3})/);
        const speedMatch = movementStr.match(/(\d+)\s*km\/h/i);
        
        if(!dirMatch || !speedMatch) return null;
        const bearing = bearMap[dirMatch[1]];
        const speed = parseFloat(speedMatch[1]);
        if(bearing === undefined || isNaN(speed)) return null;

        const dist = speed * 2; // 2 hour forecast
        const R = 6371; 
        const brng = bearing * Math.PI / 180;
        const lat1 = lat * Math.PI / 180;
        const lon1 = lng * Math.PI / 180;

        const lat2 = Math.asin(Math.sin(lat1)*Math.cos(dist/R) + Math.cos(lat1)*Math.sin(dist/R)*Math.cos(brng));
        const lon2 = lon1 + Math.atan2(Math.sin(brng)*Math.sin(dist/R)*Math.cos(lat1), Math.cos(dist/R)-Math.sin(lat1)*Math.sin(lat2));

        return [lat2 * 180 / Math.PI, lon2 * 180 / Math.PI];
    }

    // Generate Payload
    function updatePayload() {
        if (!currentDrawnLayer) return;
        const latlngs = currentDrawnLayer.getLatLngs()[0];
        const coordStr = latlngs.map(ll => `${ll.lat.toFixed(4)},${ll.lng.toFixed(4)}`).join(';');
        const bounds = currentDrawnLayer.getBounds();
        const center = bounds.getCenter();
        const centerStr = `${Math.abs(center.lat).toFixed(1)}°${center.lat >= 0 ? 'N' : 'S'} ${Math.abs(center.lng).toFixed(1)}°${center.lng >= 0 ? 'E' : 'W'}`;
        const nw = bounds.getNorthWest(), se = bounds.getSouthEast();
        const diameterKm = (genMap.distance(nw, se) / 1000).toFixed(0) + ' km';
        
        const movement = document.getElementById('meso-movement').value || '';
        const intensity = document.getElementById('meso-intensity').value || '';
        
        const severity = calculateSeverity(intensity, diameterKm);
        
        document.getElementById('admin-sev-badge').className = `sev-badge sev-${severity}`;
        document.getElementById('admin-sev-badge').innerText = severity;

        document.getElementById('coord-output').value = `${coordStr}|${centerStr}|${diameterKm}|${movement}|${intensity}|${severity}`;
    }

    // Map Render Logic based on Time
    function renderMapAtTime(targetTimeMs) {
        viewLayers.forEach(l => viewMap.removeLayer(l));
        viewLayers = [];

        globalHistoryData.mesoscale_discussions.forEach(storm => {
            const issueMs = new Date(storm.issue_time).getTime();
            const endMs = storm.end_time ? new Date(storm.end_time).getTime() : Infinity;
            
            // If storm existed at this target time
            if (targetTimeMs >= issueMs && targetTimeMs <= endMs) {
                // Find the closest update snapshot before the target time
                let activeSnapshot = null;
                if (storm.updates) {
                    const validUpdates = storm.updates.filter(u => new Date(u.time).getTime() <= targetTimeMs);
                    if (validUpdates.length > 0) activeSnapshot = validUpdates[validUpdates.length - 1];
                }
                
                if (activeSnapshot && activeSnapshot.coords && activeSnapshot.coords.length > 0) {
                    const sev = activeSnapshot.severity || 'S1';
                    const colors = { 'S1':'#2ecc71','S2':'#f1c40f','S3':'#e67e22','S4':'#e74c3c','S5':'#9b59b6' };
                    
                    // Draw Polygon
                    const poly = L.polygon(activeSnapshot.coords, {color: colors[sev], fillOpacity: 0.3}).addTo(viewMap);
                    viewLayers.push(poly);

                    // Draw 2-Hour Forecast Track
                    if (activeSnapshot.center && activeSnapshot.movement) {
                        const forecastPt = getForecastCoords(activeSnapshot.center, activeSnapshot.movement);
                        if (forecastPt) {
                            // Convert center text to lat/lng array for line drawing
                            const centerMatch = activeSnapshot.center.match(/([\d\.]+)/g);
                            const cLat = parseFloat(centerMatch[0]) * (activeSnapshot.center.includes('S') ? -1 : 1);
                            const cLng = parseFloat(centerMatch[1]) * (activeSnapshot.center.includes('W') ? -1 : 1);
                            
                            const trackLine = L.polyline([[cLat, cLng], forecastPt], {color: 'white', dashArray: '5, 10', weight: 2}).addTo(viewMap);
                            const fcstMarker = L.circleMarker(forecastPt, {radius: 4, color: 'white', fillOpacity: 0.8}).addTo(viewMap);
                            fcstMarker.bindTooltip("+2 Hrs Forecast", {permanent: true, direction: "top", opacity: 0.7});
                            
                            viewLayers.push(trackLine);
                            viewLayers.push(fcstMarker);
                        }
                    }
                    
                    // Build Popup with History Timeline
                    let histHtml = storm.updates.slice().reverse().map(u => `
                        <div class="history-item">
                            <b>${new Date(u.time).toLocaleTimeString('zh-HK')}</b><br>
                            ${u.movement ? `💨 ${u.movement}` : ''} | ${u.intensity ? `🌧️ ${u.intensity}` : ''}
                        </div>
                    `).join('');

                    let popupHtml = `
                        <div style="font-family:sans-serif; min-width: 220px;">
                            <h4 style="margin:0 0 8px 0; border-bottom:1px solid #555; padding-bottom:5px;">
                                🌪️ ID: ${storm.id} <span class="sev-badge sev-${sev}">${sev}</span>
                            </h4>
                            <ul style="list-style:none; padding:0; margin:0; line-height:1.6; font-size:13px;">
                                ${activeSnapshot.center ? `<li>📍 <b>Center:</b> ${activeSnapshot.center}</li>` : ''}
                                ${activeSnapshot.movement ? `<li>💨 <b>Move:</b> ${activeSnapshot.movement}</li>` : ''}
                                ${activeSnapshot.intensity ? `<li>🌧️ <b>Rain:</b> ${activeSnapshot.intensity}</li>` : ''}
                            </ul>
                            <div class="history-list">
                                <b>Storm History:</b><br>
                                ${histHtml}
                            </div>
                        </div>
                    `;
                    poly.bindPopup(popupHtml);
                }
            }
        });
    }

    // Setup Timeline Scrubber
    function setupTimeline() {
        const slider = document.getElementById('timeSlider');
        const display = document.getElementById('timeDisplay');
        const now = Date.now();
        const sevenDaysAgo = now - (7 * 24 * 60 * 60 * 1000);
        
        slider.min = sevenDaysAgo;
        slider.max = now;
        slider.value = now;

        slider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            if (val >= now - 60000) { // Within 1 min is considered live
                isLive = true;
                display.innerText = "Live Data";
                renderMapAtTime(now);
            } else {
                isLive = false;
                const d = new Date(val);
                display.innerText = d.toLocaleString('zh-HK', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
                renderMapAtTime(val);
            }
        });
    }

    function goToLive() {
        const slider = document.getElementById('timeSlider');
        slider.value = slider.max;
        isLive = true;
        document.getElementById('timeDisplay').innerText = "Live Data";
        renderMapAtTime(Date.now());
    }

    // Fetch and Init
    async function loadData() {
        try {
            const res = await fetch('history.json?t=' + new Date().getTime());
            globalHistoryData = await res.json();
            
            if (!viewMap) {
                viewMap = L.map('map-container').setView([22.3, 114.17], 10);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(viewMap);
                setupTimeline();
            }
            
            // Only auto-update map if user is viewing "Live"
            if (isLive) renderMapAtTime(Date.now());

        } catch (e) { console.error("Data load failed", e); }
    }

    // Admin Panel Init
    function toggleAdmin() {
        const panel = document.getElementById('adminTools');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        if (panel.style.display === 'block' && !generatorMapInit) {
            generatorMapInit = true;
            genMap = L.map('generator-map').setView([22.3, 114.17], 10);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(genMap);
            
            const drawnItems = new L.FeatureGroup(); genMap.addLayer(drawnItems);
            const drawControl = new L.Control.Draw({ edit: {featureGroup: drawnItems}, draw: {marker:false, polyline:false, circle:false, circlemarker:false} });
            genMap.addControl(drawControl);

            genMap.on(L.Draw.Event.CREATED, (e) => {
                drawnItems.clearLayers(); currentDrawnLayer = e.layer; drawnItems.addLayer(currentDrawnLayer); updatePayload();
            });
            genMap.on(L.Draw.Event.EDITED, updatePayload);
        }
    }

    loadData();
    setInterval(() => { if(isLive) loadData(); }, 60000); 
</script>
</body>
</html>
